name: ci

# Deps reference sibling repos via :local/root (../langgraph-clj,
# ../langchain-clj); those are PUBLIC, so the test job reconstructs the west
# layout via checkout. Until the standalone repo's Actions are enabled, the
# gates run locally / in the west superproject: `clojure -M:lint` and
# `clojure -M:dev:test`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/com-junkawasaki/kekkai-actor }
      - uses: actions/checkout@v4
        with: { repository: com-junkawasaki/langgraph-clj, path: orgs/com-junkawasaki/langgraph-clj }
      - uses: actions/checkout@v4
        with: { repository: com-junkawasaki/langchain-clj, path: orgs/com-junkawasaki/langchain-clj }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (zero-trust contract · store parity · CACAO crypto)
        working-directory: orgs/com-junkawasaki/kekkai-actor
        run: clojure -M:dev:test
