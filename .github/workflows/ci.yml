name: ci

# Deps reference the langchain sibling repo via :local/root (../langchain);
# it's PUBLIC, so the test job reconstructs the west layout via checkout.
# Until the standalone repo's Actions are enabled, the gates run locally /
# in the west superproject: `clojure -M:lint` and `clojure -M:dev:test`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/kotoba-lang/kekkai }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/langchain, path: orgs/kotoba-lang/langchain }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (zero-trust contract · store parity · CACAO crypto)
        working-directory: orgs/kotoba-lang/kekkai
        run: clojure -M:dev:test
